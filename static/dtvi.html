<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Twin Vision Inspector</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #2563eb;
}

header h1{
    color:#60a5fa;
}

header p{
    margin-top:8px;
    color:#cbd5e1;
}

.dashboard{
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}

.card h3{
    margin-bottom:10px;
    color:#38bdf8;
}

.status{
    font-size:22px;
    font-weight:bold;
}

.green{
    color:#22c55e;
}

.red{
    color:#ef4444;
}

.section{
    margin-top:30px;
}

.camera{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

.camera img{
    width:100%;
    border-radius:10px;
}

.alert-box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

.alert{
    padding:12px;
    margin:10px 0;
    border-left:5px solid red;
    background:#334155;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:30px;
    background:#111827;
}

</style>

</head>

<body>

<header>
    <h1>Digital Twin Vision Inspector</h1>
    <p>Made by NIT Kurukshetra Students</p>
</header>

<div class="dashboard">

    <div class="cards">

        <div class="card">
            <h3>Machine Status</h3>
            <div class="status green" id="machine-status">Operational</div>
        </div>

        <div class="card">
            <h3>Defects Detected</h3>
            <div class="status" id="defects-count">07</div>
        </div>

        <div class="card">
            <h3>Inspection Accuracy</h3>
            <div class="status">100%</div>
        </div>

        <div class="card">
            <h3>Digital Twin Sync</h3>
            <div class="status green">Active</div>
        </div>

    </div>

    <div class="section">
        <h2>Live Camera Feed</h2>
        <br>

        <div class="camera">
            <video id="localVideo" autoplay playsinline style="display:none;"></video>
            <canvas id="overlay" style="display:none;"></canvas>
            <canvas id="displayCanvas" style="width:100%; border-radius:10px;"></canvas>
        </div>
    </div>

    <div class="section">
        <h2>Inspection Alerts</h2>
        <br>

        <div class="alert-box" id="alert-box">
        </div>
    </div>

</div>

<footer>
    © 2026 Digital Twin Vision Inspector | NIT Kurukshetra
</footer>

<script>
    const defectsEl = document.getElementById("defects-count");
    const statusEl = document.getElementById("machine-status");

    const socket = new WebSocket("ws://localhost:8000/ws");

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);

        defectsEl.textContent = data.defects_detected;
        statusEl.textContent = data.machine_status;

        if (data.alerts) {
            const alertBox = document.getElementById("alert-box");
            alertBox.innerHTML = "";

            data.alerts.slice().reverse().forEach(function(alert) {
                const div = document.createElement("div");
                div.className = "alert";
                div.textContent = alert.message;
                alertBox.appendChild(div);
            });
        }
    };

    socket.onerror = function(error) {
        console.log("WebSocket error:", error);
    };

    const video = document.getElementById("localVideo");
    const canvas = document.getElementById("overlay");

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(() => console.log("Camera access denied"));

    async function captureAndSend() {
        if (!video.videoWidth || !video.videoHeight) return;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);

        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append("file", blob, "frame.jpg");

            try {
                const res = await fetch("/detect-frame", { method: "POST", body: formData });
                const data = await res.json();

                // Draw boxes over video using a second visible canvas overlay
                drawDetections(data.detections);
            } catch (err) {
                console.error("Error sending frame:", err);
            }
        }, "image/jpeg");
    }

    function drawDetections(detections) {
        const displayCanvas = document.getElementById("displayCanvas");
        const ctx = displayCanvas.getContext("2d");
        displayCanvas.width = video.videoWidth;
        displayCanvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        detections.forEach(d => {
            ctx.strokeStyle = d.class === "OK" ? "lime" : "red";
            ctx.lineWidth = 3;
            ctx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = "18px Arial";
            ctx.fillText(`${d.class} ${d.confidence}`, d.x1, d.y1 - 8);
        });
    }

    setInterval(captureAndSend, 1000);
</script>

</body>
</html>
